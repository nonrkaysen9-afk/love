<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТЫК</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #f5f5f5;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      .container {
        text-align: center;
      }
      h1 {
        color: #ff4757;
        font-size: 100px;
        margin: 0;
        line-height: 1;
      }
      p {
        color: #57606f;
        font-size: 18px;
        margin-top: 10px;
      }
      .cat-background {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      .cat-background img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="cat-background">
      <img src="cat.gif" alt="кот" />
    </div>

    <div class="container">
      <h1>ТЫК</h1>
      <p>Нажми, чтобы увидеть всё</p>
    </div>

    <!-- Музыка закомментирована, чтобы не играла и не вызывала ошибок -->

    </audio> 
    -->

      console.log("Страница загружена");
    </script>
  </body>
</html>
